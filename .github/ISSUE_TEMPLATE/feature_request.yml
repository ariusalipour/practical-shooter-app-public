name: Feature request
description: Suggest an improvement or new feature for the Practical Shooter App.
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing an idea. Please describe the problem you'd like the app to solve.
  - type: input
    id: summary
    attributes:
      label: Feature summary
      description: A short description of your idea.
      placeholder: Add support for USPSA rulebooks
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the current limitation or pain point.
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour or capability you would like to see.
  - type: textarea
    id: impact
    attributes:
      label: How would this help?
      description: Who is affected and how would this improve your experience?
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add mockups, examples, links to other apps, or any related details here.
